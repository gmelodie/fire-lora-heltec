<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Watch — Cerrado Sensor Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <h2>Fire Watch</h2>
      <p>Enter API password to access the dashboard</p>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      <button id="login-btn">Login</button>
      <p id="login-error" class="error hidden">Wrong password. Try again.</p>
    </div>
  </div>

  <header>
    <div class="header-title">
      <span class="header-icon">&#9650;</span>
      Fire Watch &mdash; Cerrado Sensor Dashboard
    </div>
    <div class="header-meta">
      <span id="refresh-badge">Refreshing in <span id="refresh-countdown">30</span>s</span>
    </div>
  </header>

  <main>
    <section class="section">
      <h2 class="section-title">Current State</h2>
      <div id="sensor-grid" class="sensor-grid">
        <p class="placeholder">Loading sensors&hellip;</p>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Live Graphs</h2>
      <div class="chart-controls">
        <div class="controls-row">
          <div class="search-group">
            <label for="sensor-select">Sensor</label>
            <select id="sensor-select">
              <option value="">All Sensors</option>
            </select>
          </div>
          <div class="preset-group">
            <label>Range</label>
            <div class="preset-btns">
              <button class="preset-btn" data-preset="1h">1h</button>
              <button class="preset-btn" data-preset="6h">6h</button>
              <button class="preset-btn active" data-preset="24h">24h</button>
              <button class="preset-btn" data-preset="7d">7d</button>
              <button class="preset-btn" data-preset="custom">Custom</button>
            </div>
          </div>
        </div>
        <div id="custom-range" class="controls-row hidden">
          <div class="search-group">
            <label for="from-dt">From</label>
            <input type="datetime-local" id="from-dt">
          </div>
          <div class="search-group">
            <label for="to-dt">To</label>
            <input type="datetime-local" id="to-dt">
          </div>
          <button id="apply-custom-btn">Apply</button>
        </div>
      </div>
      <div id="charts-grid" class="charts-grid">
        <p class="placeholder" style="padding:1rem">Loading data&hellip;</p>
      </div>
    </section>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
