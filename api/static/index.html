<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Watch — Cerrado Sensor Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <h2>Fire Watch</h2>
      <p>Enter API password to access the dashboard</p>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      <button id="login-btn">Login</button>
      <p id="login-error" class="error hidden">Wrong password. Try again.</p>
    </div>
  </div>

  <header>
    <div class="header-title">
      <span class="header-icon">&#9650;</span>
      Fire Watch &mdash; Cerrado Sensor Dashboard
    </div>
    <div class="header-meta">
      <span id="refresh-badge">Refreshing in <span id="refresh-countdown">30</span>s</span>
    </div>
  </header>

  <main>
    <section class="section">
      <h2 class="section-title">Current State</h2>
      <div id="sensor-grid" class="sensor-grid">
        <p class="placeholder">Loading sensors&hellip;</p>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">History</h2>
      <div class="search-bar">
        <div class="search-group">
          <label for="sensor-select">Sensor</label>
          <select id="sensor-select">
            <option value="">— select —</option>
          </select>
        </div>
        <div class="search-group">
          <label for="metric-select">Metric</label>
          <select id="metric-select">
            <option value="temperature">Temperature (°C)</option>
            <option value="humidity">Humidity (%)</option>
            <option value="pressure">Pressure (hPa)</option>
            <option value="battery">Battery (%)</option>
            <option value="rssi">RSSI (dBm)</option>
          </select>
        </div>
        <div class="search-group">
          <label for="from-dt">From</label>
          <input type="datetime-local" id="from-dt">
        </div>
        <div class="search-group">
          <label for="to-dt">To</label>
          <input type="datetime-local" id="to-dt">
        </div>
        <button id="search-btn">Search</button>
      </div>
      <div class="chart-container">
        <canvas id="history-chart"></canvas>
        <p id="chart-placeholder" class="placeholder">Select a sensor and metric, then press Search.</p>
      </div>
    </section>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
